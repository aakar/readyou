name: "Release"
on:
  push:
    tags:
      - "v*"
      - "*-feedly"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3.3.0

      - uses: actions/setup-java@v3.10.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: ./gradlew assembleGithubRelease

      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/github/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK file found"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Delete existing release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset "${{ github.ref_name }}" "*.zip" --yes 2>/dev/null || true
          gh release delete-asset "${{ github.ref_name }}" "*.tar.gz" --yes 2>/dev/null || true

      - name: Upload APK to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" "${{ steps.find_apk.outputs.apk_path }}" --clobber
